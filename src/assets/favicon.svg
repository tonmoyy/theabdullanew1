<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
    <!-- Navy background -->
    <rect width="32" height="32" fill="#0a1628"/>

    <!-- Decorative gold corner lines top -->
    <line x1="4" y1="4" x2="10" y2="4" stroke="#b8986a" stroke-width="1"/>
    <line x1="4" y1="4" x2="4" y2="10" stroke="#b8986a" stroke-width="1"/>
    <line x1="22" y1="4" x2="28" y2="4" stroke="#b8986a" stroke-width="1"/>
    <line x1="28" y1="4" x2="28" y2="10" stroke="#b8986a" stroke-width="1"/>

    <!-- AC Monogram -->
    <text
            x="16"
            y="22"
            font-family="Georgia, serif"
            font-size="18"
            font-weight="400"
            text-anchor="middle"
            fill="#b8986a"
            letter-spacing="1"
    >Abdlla Capital</text>

    <!-- Decorative gold corner lines bottom -->
    <line x1="4" y1="22" x2="4" y2="28" stroke="#b8986a" stroke-width="1"/>
    <line x1="4" y1="28" x2="10" y2="28" stroke="#b8986a" stroke-width="1"/>
    <line x1="22" y1="28" x2="28" y2="28" stroke="#b8986a" stroke-width="1"/>
    <line x1="28" y1="22" x2="28" y2="28" stroke="#b8986a" stroke-width="1"/>
</svg>